name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    # Pinned to the soon-to-be-default image. windows-latest flips
    # from Server 2022 (VS2022) to Server 2025 (VS2026) on 2026-06-15;
    # pinning now eats the migration with weeks of buffer to find any
    # incompatibility instead of meeting it on flip day. Revert to
    # windows-2022 if the image regresses.
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build src/InstallerClean/InstallerClean.csproj

      - name: Build CLI
        run: dotnet build src/InstallerClean.Cli/InstallerClean.Cli.csproj

      - name: Test
        run: dotnet test src/InstallerClean.Tests/

      - name: Smoke-publish self-contained
        run: dotnet publish src/InstallerClean/InstallerClean.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -p:EnableCompressionInSingleFile=true -o publish/self-contained

      - name: Smoke-publish framework-dependent
        run: dotnet publish src/InstallerClean/InstallerClean.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish/framework-dependent

      - name: Smoke-publish CLI framework-dependent
        run: dotnet publish src/InstallerClean.Cli/InstallerClean.Cli.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -o publish/cli

      - name: Audit vulnerable packages (GUI)
        run: dotnet list src/InstallerClean/InstallerClean.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (Core)
        run: dotnet list src/InstallerClean.Core/InstallerClean.Core.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (CLI)
        run: dotnet list src/InstallerClean.Cli/InstallerClean.Cli.csproj package --vulnerable --include-transitive
        continue-on-error: true

      - name: Audit vulnerable packages (Tests)
        run: dotnet list src/InstallerClean.Tests/InstallerClean.Tests.csproj package --vulnerable --include-transitive
        continue-on-error: true
