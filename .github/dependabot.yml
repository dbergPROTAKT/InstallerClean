version: 2
updates:
  - package-ecosystem: nuget
    directory: /src/InstallerClean
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuget:
        patterns:
          - "*"
    # Patch bumps on the three runtime packages that travel in the
    # binary closure (Microsoft.Extensions.DependencyInjection,
    # .Abstractions, System.Diagnostics.EventLog) shift the apphost
    # hash and have tripped Avast/AVG/DeepInstinct ML classifiers
    # before. Security advisories still PR through because Dependabot's
    # security-update path overrides version-update:ignore.
    ignore:
      - dependency-name: Microsoft.Extensions.DependencyInjection
        update-types:
          - version-update:semver-patch
      - dependency-name: Microsoft.Extensions.DependencyInjection.Abstractions
        update-types:
          - version-update:semver-patch
      - dependency-name: System.Diagnostics.EventLog
        update-types:
          - version-update:semver-patch

  - package-ecosystem: nuget
    directory: /src/InstallerClean.Core
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuget:
        patterns:
          - "*"
    ignore:
      - dependency-name: Microsoft.Extensions.DependencyInjection
        update-types:
          - version-update:semver-patch
      - dependency-name: Microsoft.Extensions.DependencyInjection.Abstractions
        update-types:
          - version-update:semver-patch
      - dependency-name: System.Diagnostics.EventLog
        update-types:
          - version-update:semver-patch

  - package-ecosystem: nuget
    directory: /src/InstallerClean.Cli
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuget:
        patterns:
          - "*"
    ignore:
      - dependency-name: Microsoft.Extensions.DependencyInjection
        update-types:
          - version-update:semver-patch
      - dependency-name: Microsoft.Extensions.DependencyInjection.Abstractions
        update-types:
          - version-update:semver-patch
      - dependency-name: System.Diagnostics.EventLog
        update-types:
          - version-update:semver-patch

  - package-ecosystem: nuget
    directory: /src/InstallerClean.Tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      nuget:
        patterns:
          - "*"
    ignore:
      - dependency-name: Microsoft.Extensions.DependencyInjection
        update-types:
          - version-update:semver-patch
      - dependency-name: Microsoft.Extensions.DependencyInjection.Abstractions
        update-types:
          - version-update:semver-patch
      - dependency-name: System.Diagnostics.EventLog
        update-types:
          - version-update:semver-patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
